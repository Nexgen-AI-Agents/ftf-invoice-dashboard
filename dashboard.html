<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FTF Invoice Pipeline — Live Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
header{background:#1a1d27;border-bottom:2px solid #2563eb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:.3px}
header h1 span{color:#2563eb}
#refresh-info{font-size:.78rem;color:#6b7280}
#refresh-info b{color:#10b981}
.container{max-width:1400px;margin:0 auto;padding:20px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:8px;padding:14px 16px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;line-height:1}
.stat-card .lbl{font-size:.72rem;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.s-needed{color:#f59e0b}.s-collected{color:#60a5fa}.s-posted{color:#a78bfa}.s-approved{color:#34d399}.s-finalized{color:#10b981}.s-sent{color:#6ee7b7}.s-hold{color:#fb923c}.s-rejected{color:#f87171}.s-total{color:#e0e0e0}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.controls input,.controls select{background:#1a1d27;border:1px solid #2a2d3e;color:#e0e0e0;padding:7px 12px;border-radius:6px;font-size:.85rem;outline:none}
.controls input:focus,.controls select:focus{border-color:#2563eb}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:background .15s}
.btn-ghost{background:#2a2d3e;color:#e0e0e0}.btn-ghost:hover{background:#374151}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2a2d3e}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:#1a1d27;padding:10px 12px;text-align:left;color:#9ca3af;font-weight:600;text-transform:uppercase;font-size:.72rem;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid #2a2d3e;cursor:pointer;user-select:none}
thead th:hover{color:#e0e0e0}
thead th.sorted-asc::after{content:" ▲";color:#2563eb}
thead th.sorted-desc::after{content:" ▼";color:#2563eb}
tbody tr{border-bottom:1px solid #1f2233;transition:background .1s}
tbody tr:hover{background:#1a1d27}
tbody td{padding:9px 12px;vertical-align:top;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-row td{text-align:center;color:#6b7280;padding:32px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap}
.badge-needed{background:#78350f;color:#fcd34d}.badge-collected{background:#1e3a5f;color:#93c5fd}.badge-posted{background:#3b1f7a;color:#c4b5fd}.badge-approved{background:#064e3b;color:#6ee7b7}.badge-finalized{background:#065f46;color:#34d399}.badge-sent{background:#022c22;color:#10b981}.badge-hold{background:#7c2d12;color:#fdba74}.badge-rejected{background:#7f1d1d;color:#fca5a5}.badge-modified{background:#312e81;color:#a5b4fc}.badge-unknown{background:#1f2937;color:#9ca3af}
.pagination{display:flex;gap:6px;margin-top:14px;align-items:center;flex-wrap:wrap}
.pagination button{background:#1a1d27;border:1px solid #2a2d3e;color:#e0e0e0;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:.8rem}
.pagination button.active{background:#2563eb;border-color:#2563eb;color:#fff}
.pagination button:hover:not(.active){background:#2a2d3e}
.page-info{color:#6b7280;font-size:.8rem;margin-left:auto}
.chart-section{background:#1a1d27;border:1px solid #2a2d3e;border-radius:8px;padding:20px;margin-bottom:24px}
.chart-section h2{font-size:.95rem;color:#9ca3af;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
#statusChart{max-height:220px}
.last-updated{font-size:.75rem;color:#4b5563;margin-bottom:10px}
.last-updated b{color:#6b7280}
#loading{text-align:center;padding:60px;color:#6b7280}
.spinner{width:32px;height:32px;border:3px solid #2a2d3e;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>FTF Invoice Pipeline — <span>Live Dashboard</span></h1>
  <div id="refresh-info">Auto-refresh every <b>2 min</b> &nbsp;|&nbsp; Next: <b id="countdown">2:00</b></div>
</header>
<div class="container">
  <div id="loading"><div class="spinner"></div>Loading pipeline state…</div>
  <div id="main" style="display:none">
    <div class="last-updated">Last data snapshot: <b id="gen-time">—</b></div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-section">
      <h2>Orders by Status</h2>
      <canvas id="statusChart"></canvas>
    </div>
    <div class="controls">
      <input type="text" id="search" placeholder="Search order, client, address…" style="min-width:220px">
      <select id="statusFilter"><option value="">All statuses</option></select>
      <button class="btn btn-ghost" onclick="resetFilters()">Reset</button>
      <span style="margin-left:auto;color:#6b7280;font-size:.8rem" id="row-count"></span>
    </div>
    <div class="table-wrap">
      <table id="orders-table">
        <thead><tr>
          <th onclick="sortBy('order_id')">Order ID</th>
          <th onclick="sortBy('client_name')">Client</th>
          <th onclick="sortBy('property_address')">Address</th>
          <th onclick="sortBy('service_type')">Service</th>
          <th onclick="sortBy('status')">Status</th>
          <th onclick="sortBy('estimate_amount')">Amount</th>
          <th onclick="sortBy('approved_by')">Approved By</th>
          <th onclick="sortBy('created_at')">Created</th>
          <th onclick="sortBy('updated_at')">Updated</th>
        </tr></thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
<script>
const JSON_URL = 'https://raw.githubusercontent.com/Nexgen-AI-Agents/ftf-invoice-dashboard/main/pipeline_state.json';
const PAGE_SIZE = 25;
let allOrders = [], filtered = [], sortCol = 'updated_at', sortDir = -1, page = 1, chartInstance = null;
const STATUS_LABELS = {
  invoice_needed:['Needs Invoice','badge-needed'],
  data_collected:['Data Collected','badge-collected'],
  invoice_draft_posted:['Draft Posted','badge-posted'],
  invoice_approved:['Approved','badge-approved'],
  invoice_finalized:['Finalized','badge-finalized'],
  invoice_sent:['Sent','badge-sent'],
  on_hold:['On Hold','badge-hold'],
  invoice_rejected:['Rejected','badge-rejected'],
  invoice_modification_requested:['Modification Req','badge-modified'],
};
const STAT_DEFS = [
  {key:'total',label:'Total',cls:'s-total'},
  {key:'invoice_needed',label:'Needs Invoice',cls:'s-needed'},
  {key:'data_collected',label:'Data Collected',cls:'s-collected'},
  {key:'invoice_draft_posted',label:'Draft Posted',cls:'s-posted'},
  {key:'invoice_approved',label:'Approved',cls:'s-approved'},
  {key:'invoice_finalized',label:'Finalized',cls:'s-finalized'},
  {key:'invoice_sent',label:'Sent',cls:'s-sent'},
  {key:'on_hold',label:'On Hold',cls:'s-hold'},
  {key:'invoice_rejected',label:'Rejected',cls:'s-rejected'},
];
const CHART_COLORS=['#f59e0b','#60a5fa','#a78bfa','#34d399','#10b981','#6ee7b7','#fb923c','#f87171','#818cf8','#c084fc','#38bdf8','#4ade80','#facc15','#fb7185','#e879f9'];
function badge(s){const[l,c]=STATUS_LABELS[s]||[s||'—','badge-unknown'];return`<span class="badge ${c}">${l}</span>`;}
function fmt(v){return v==null||v===''?'—':v;}
function fmtDate(v){if(!v)return'—';try{return new Date(v).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return v;}}
function fmtAmt(v){if(v==null||v==='')return'—';const n=parseFloat(v);return isNaN(n)?v:'$'+n.toFixed(2);}
function renderStats(counts,total){
  document.getElementById('stats-grid').innerHTML=STAT_DEFS.map(d=>{
    const v=d.key==='total'?total:(counts[d.key]||0);
    return`<div class="stat-card"><div class="num ${d.cls}">${v}</div><div class="lbl">${d.label}</div></div>`;
  }).join('');
}
function populateStatusFilter(counts){
  const sel=document.getElementById('statusFilter');
  Object.keys(counts).sort().forEach(s=>{
    const o=document.createElement('option');o.value=s;
    o.textContent=(STATUS_LABELS[s]||[s])[0]+` (${counts[s]})`;
    sel.appendChild(o);
  });
}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const stat=document.getElementById('statusFilter').value;
  filtered=allOrders.filter(o=>{
    if(stat&&o.status!==stat)return false;
    if(q){const h=[o.order_id,o.client_name,o.property_address,o.service_type,o.status].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  page=1;renderTable();
}
function sortBy(col){
  const ths=document.querySelectorAll('thead th');
  const cols=['order_id','client_name','property_address','service_type','status','estimate_amount','approved_by','created_at','updated_at'];
  if(sortCol===col)sortDir=-sortDir;else{sortCol=col;sortDir=1;}
  ths.forEach((th,i)=>{th.classList.remove('sorted-asc','sorted-desc');if(cols[i]===sortCol)th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');});
  filtered.sort((a,b)=>{let av=a[sortCol]||'',bv=b[sortCol]||'';if(sortCol==='estimate_amount'){av=parseFloat(av)||0;bv=parseFloat(bv)||0;}return av<bv?-sortDir:av>bv?sortDir:0;});
  page=1;renderTable();
}
function renderTable(){
  const body=document.getElementById('orders-body');
  const total=filtered.length;
  document.getElementById('row-count').textContent=`${total} order${total!==1?'s':''}`;
  if(total===0){body.innerHTML='<tr class="empty-row"><td colspan="9">No orders match the current filters.</td></tr>';document.getElementById('pagination').innerHTML='';return;}
  const start=(page-1)*PAGE_SIZE;
  body.innerHTML=filtered.slice(start,start+PAGE_SIZE).map(o=>`<tr>
    <td title="${o.order_id||''}">${fmt(o.order_id)}</td>
    <td title="${o.client_name||''}">${fmt(o.client_name)}</td>
    <td title="${o.property_address||''}">${fmt(o.property_address)}</td>
    <td title="${o.service_type||''}">${fmt(o.service_type)}</td>
    <td>${badge(o.status)}</td>
    <td>${fmtAmt(o.estimate_amount)}</td>
    <td>${fmt(o.approved_by)}</td>
    <td>${fmtDate(o.created_at)}</td>
    <td>${fmtDate(o.updated_at)}</td>
  </tr>`).join('');
  renderPagination(total);
}
function renderPagination(total){
  const pages=Math.ceil(total/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(pages<=1){pag.innerHTML='';return;}
  let html='';
  const start=(page-1)*PAGE_SIZE+1,end=Math.min(page*PAGE_SIZE,total);
  for(let p=1;p<=pages;p++){
    if(pages>10&&p>2&&p<pages-1&&Math.abs(p-page)>2){if(p===3||p===pages-2)html+='<span style="color:#6b7280;padding:0 4px">…</span>';continue;}
    html+=`<button onclick="goPage(${p})" class="${p===page?'active':''}">${p}</button>`;
  }
  html+=`<span class="page-info">Showing ${start}–${end} of ${total}</span>`;
  pag.innerHTML=html;
}
function goPage(p){page=p;renderTable();}
function resetFilters(){document.getElementById('search').value='';document.getElementById('statusFilter').value='';filtered=[...allOrders];page=1;renderTable();}
function initChart(counts){
  if(!window.Chart)return;
  const labels=Object.keys(counts).map(k=>(STATUS_LABELS[k]||[k])[0]);
  const data=Object.values(counts);
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(document.getElementById('statusChart'),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:CHART_COLORS.slice(0,labels.length),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1f2233'},ticks:{color:'#9ca3af',font:{size:11}}},y:{grid:{color:'#1f2233'},ticks:{color:'#9ca3af',stepSize:1},beginAtZero:true}}},
  });
}
function loadChartJs(){
  const s=document.createElement('script');
  s.onload=function(){initChart(window._chartCounts||{});};
  s.onerror=function(){
    const s2=document.createElement('script');
    s2.onload=function(){initChart(window._chartCounts||{});};
    s2.onerror=function(){console.warn('Chart.js unavailable');};
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
    document.head.appendChild(s2);
  };
  s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
  document.head.appendChild(s);
}
async function loadData(){
  try{
    const r=await fetch(JSON_URL+'?_='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    allOrders=data.orders||[];
    const counts=data.status_counts||{},total=data.total||allOrders.length;
    document.getElementById('gen-time').textContent=data.generated_at?new Date(data.generated_at).toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'}):—';
    renderStats(counts,total);
    populateStatusFilter(counts);
    filtered=[...allOrders];
    sortBy('updated_at');
    window._chartCounts=counts;
    loadChartJs();
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='';
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="color:#f87171">Failed to load data.<br><small>${e.message}</small></div>`;
  }
}
let seconds=120;
function tick(){seconds--;if(seconds<0){seconds=120;loadData();}const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('countdown').textContent=m+':'+(s<10?'0':'')+s;}
setInterval(tick,1000);
document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('statusFilter').addEventListener('change',applyFilters);
loadData();
</script>
</body>
</html>
